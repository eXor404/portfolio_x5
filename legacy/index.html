<style>
  html { scroll-behavior: smooth; }
  html, body { margin: 0; background: var(--surface-page); color: var(--ink-0); }
  #app { min-height: 100vh; display: flex; flex-direction: column; }
  main { flex: 1; width: 100%; }

  /* Whitespace dialed up beyond the source design: taller section rhythm,
     wider page margins, and more air above the hero. All breathing room is
     driven from these tokens so the imported components stay untouched. */
  body { --sec-y: clamp(150px, 22vh, 280px); --page-x: clamp(32px, 7vw, 132px); }
  body[data-density="generous"] { --sec-y: clamp(104px, 15vh, 184px); }

  .hero    { max-width: 1320px; margin: 0 auto; padding: clamp(56px, 9vh, 120px) var(--page-x) 0; }
  .section { max-width: 1320px; margin: 0 auto; padding: var(--sec-y) var(--page-x); }
  .section + .section { padding-top: 0; }
  main .section:first-child { padding-top: clamp(72px, 10vh, 140px); }

  body[data-texture="off"] .bp-grid,
  body[data-texture="off"] .bp-dots,
  body[data-texture="off"] .bp-ruled { background-image: none !important; }

  a:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .article-row:hover .article-title { color: var(--accent); }
  .article-row { transition: background var(--dur-fast, 160ms) ease; }
  .article-row:hover { background: color-mix(in srgb, var(--paper-2) 55%, transparent); }

  @media (max-width: 900px) {
    .work-grid, .contact-grid, .about-grid, .skill-grid,
    .feat-card-inner, .hero-split, .hero-lower { grid-template-columns: 1fr !important; }
    .hero-split > div:nth-child(2) { border-left: none !important; padding-left: 0 !important; }
  }
  @media (max-width: 720px) {
    .nav-links a:not(.nav-icon) { display: none; }
    .hide-sm { display: none; }
    .article-row { grid-template-columns: 1fr !important; }
    .tl-row { grid-template-columns: 64px 1fr !important; gap: 20px !important; }
  }
</style>
