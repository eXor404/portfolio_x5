# Serves the built SPA and reverse-proxies /api to the contact backend, which
# is only reachable on the internal compose network (no host port).

# Public scheme for absolute URLs: trust an upstream TLS-terminating proxy's
# X-Forwarded-Proto when present, otherwise fall back to this hop's scheme.
map $http_x_forwarded_proto $public_scheme {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip text assets.
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Security headers. Fonts are self-hosted, so assets and XHR are same-origin.
  # The one third party is the swisstopo map (geo.admin.ch), embedded as an iframe
  # on /about — allowed via frame-src only. Inline styles are used by the React
  # build (style attributes), hence 'unsafe-inline' for style-src only.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # Force HTTPS on repeat visits (blocks SSL-strip/downgrade). Only honoured by
  # browsers over HTTPS, so it's inert if this ever answers a plain-HTTP probe.
  # Assumes TLS terminates at/above this proxy for the public origin.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  # Isolate this document's browsing-context group from any cross-origin opener.
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-src https://*.geo.admin.ch; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

  # Proxy API calls to the backend service. Resolve the upstream at request time
  # via Docker's embedded DNS (127.0.0.11) using a variable, so nginx still boots
  # and keeps serving the static site even when contact-api is down or rebuilding
  # (a missing upstream then yields a 502 on /api only, not a dead web server).
  location /api/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $contact_api http://contact-api:8080;
    proxy_pass $contact_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Hashed build assets can be cached aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Vulnerability-disclosure pointer (RFC 9116), generated per request from the
  # actual host + scheme so it is always correct for whatever domain serves the
  # app — no hardcoded domain to drift. Keep the Expires date fresh (< 1 year).
  location = /.well-known/security.txt {
    default_type text/plain;
    add_header Content-Type "text/plain; charset=utf-8" always;
    return 200 "Contact: $public_scheme://$host/contact\nExpires: 2027-07-01T00:00:00.000Z\nPreferred-Languages: en, de\nCanonical: $public_scheme://$host/.well-known/security.txt\n";
  }

  # SPA fallback: every other path serves index.html so client routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
