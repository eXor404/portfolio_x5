# Serves the built SPA and reverse-proxies /api to the contact backend, which
# is only reachable on the internal compose network (no host port).
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip text assets.
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Security headers. CSP allows self + Google Fonts (used by the stylesheet)
  # and same-origin XHR to /api. No inline scripts are emitted by the build.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

  # Proxy API calls to the backend service.
  location /api/ {
    proxy_pass http://contact-api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Hashed build assets can be cached aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback: every other path serves index.html so client routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
