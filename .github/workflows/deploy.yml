name: Deploy

# Build the web + contact-api images, publish them to ghcr.io, then roll them
# out on the server over SSH. Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

env:
  WEB_IMAGE: ghcr.io/exor404/portfolio_x5-web
  API_IMAGE: ghcr.io/exor404/portfolio_x5-contact-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push web image
        run: |
          docker build \
            --tag ${{ env.WEB_IMAGE }}:${{ github.ref_name }} \
            --tag ${{ env.WEB_IMAGE }}:latest \
            .
          docker push ${{ env.WEB_IMAGE }}:${{ github.ref_name }}
          docker push ${{ env.WEB_IMAGE }}:latest

      - name: Build & push contact-api image
        run: |
          docker build \
            --tag ${{ env.API_IMAGE }}:${{ github.ref_name }} \
            --tag ${{ env.API_IMAGE }}:latest \
            ./server
          docker push ${{ env.API_IMAGE }}:${{ github.ref_name }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          TAG: ${{ github.ref_name }}
          DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
          # --- contact-api config: non-sensitive -> Variables, credentials/crypto -> Secrets ---
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS || 'https://daeppen.dev,https://www.daeppen.dev' }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_SECURE: ${{ vars.SMTP_SECURE || 'false' }}
          MAIL_FROM: ${{ vars.MAIL_FROM || 'Portfolio <portfolio@daeppen.dev>' }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          RETENTION_DAYS: ${{ vars.RETENTION_DAYS || '180' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          IP_SALT: ${{ secrets.IP_SALT }}
          FORM_TOKEN_SECRET: ${{ secrets.FORM_TOKEN_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,TAG,DEPLOY_PATH,ALLOWED_ORIGINS,SMTP_HOST,SMTP_PORT,SMTP_SECURE,MAIL_FROM,MAIL_TO,RETENTION_DAYS,SMTP_USER,SMTP_PASS,IP_SALT,FORM_TOKEN_SECRET
          script: |
            set -eu
            REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/eXor404/portfolio_x5.git"
            if [ ! -d "${DEPLOY_PATH}/.git" ]; then
              git clone "${REPO}" "${DEPLOY_PATH}"
            fi
            cd "${DEPLOY_PATH}"
            git fetch "${REPO}" main --tags
            git checkout "${TAG}"
            # Pin the compose images to this tag.
            echo "PORTFOLIO_VERSION=${TAG}" > .env
            # Render the contact-api env file (0600) from GitHub Secrets/Variables,
            # so no secret is ever committed and every deploy is reproducible.
            rm -f server/.env
            umask 077
            {
              echo "NODE_ENV=production"
              echo "PORT=8080"
              echo "TRUST_PROXY=1"
              echo "ALLOWED_ORIGINS=${ALLOWED_ORIGINS}"
              echo "SMTP_HOST=${SMTP_HOST:-}"
              echo "SMTP_PORT=${SMTP_PORT}"
              echo "SMTP_SECURE=${SMTP_SECURE}"
              echo "SMTP_USER=${SMTP_USER:-}"
              echo "SMTP_PASS=${SMTP_PASS:-}"
              echo "MAIL_FROM=${MAIL_FROM}"
              echo "MAIL_TO=${MAIL_TO:-}"
              echo "IP_SALT=${IP_SALT:-}"
              echo "FORM_TOKEN_SECRET=${FORM_TOKEN_SECRET:-}"
              echo "STORE_FILE=/data/messages.jsonl"
              echo "RETENTION_DAYS=${RETENTION_DAYS}"
            } > server/.env
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            docker logout ghcr.io
