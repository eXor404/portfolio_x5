# Full portfolio stack.
#   web         nginx serving the built SPA + reverse-proxying /api
#   contact-api the secure contact backend (internal network only)
#
# Deploy: push a v* tag -> .github/workflows/deploy.yml builds+pushes images to
# ghcr.io and runs `docker compose pull && up -d` on the server, pinned to the
# tag via PORTFOLIO_VERSION. `build:` is kept so local dev still works with
# `docker compose up -d --build`.
#
# The site binds to loopback only; Caddy terminates TLS and reverse-proxies to
# 127.0.0.1:${WEB_PORT}. In production server/.env is rendered by the deploy
# workflow from GitHub Secrets/Variables; for local dev, copy server/.env.example
# to server/.env.
services:
  web:
    image: ghcr.io/exor404/portfolio_x5-web:${PORTFOLIO_VERSION:-latest}
    build: .
    restart: unless-stopped
    ports:
      # Loopback only — Caddy is the public entrypoint. WEB_PORT must be free on
      # the host (3008 by default; see the server repo's Caddyfile for the map).
      - "127.0.0.1:${WEB_PORT:-3008}:80"
    depends_on:
      - contact-api
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  contact-api:
    image: ghcr.io/exor404/portfolio_x5-contact-api:${PORTFOLIO_VERSION:-latest}
    build: ./server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      # nginx is the single trusted proxy hop in front of the API.
      TRUST_PROXY: "1"
    # No host port: only the web service can reach it over the internal network.
    expose:
      - "8080"
    volumes:
      # Persist the JSONL message backup across container rebuilds.
      - contact-data:/data
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  contact-data:
